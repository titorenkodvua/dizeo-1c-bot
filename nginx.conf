# Не используется текущим docker-compose (бот на long polling).
# Оставлен как пример reverse proxy, если понадобится отдельный HTTP-сервис.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Пример: замените порт/хост на ваш HTTP-бэкенд (текущий бот по polling HTTP не слушает).
    upstream app_backend {
        server app:3001;
    }

    # HTTP → редирект на HTTPS (раскомментируйте при настроенных сертификатах)
    # server {
    #     listen 80;
    #     server_name bot.example.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        location /health {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Раскомментируйте и укажите пути к cert.pem / key.pem после выпуска сертификата
    # server {
    #     listen 443 ssl;
    #     server_name bot.example.com;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     location / {
    #         proxy_pass http://app_backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
